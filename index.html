<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>RAFAEL SAÑOZA | Home</title>
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="images/logo.png" type="image/png" sizes="16x16"> 
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

        <style>
            .dake-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 15px 5%;
                background-color: var(--bg-primary);
                border-bottom: 5px dashed var(--accent);
                position: sticky;
                top: 0;
                z-index: 1000;
            }
            .dake-header nav a {
                font-family: var(--font-display);
                color: var(--accent);
                text-decoration: none;
                font-size: 24px;
                letter-spacing: 2px;
                margin: 0 15px;
                transition: color 0.3s ease, transform 0.3s ease;
                display: inline-block;
            }
            .dake-header nav a:hover {
                color: #FFFFFF;
                transform: translateY(-3px);
            }
            .dake-header .logo-link {
                flex: 0;
                display: flex;
                justify-content: center;
            }
            .nav-left, .nav-right {
                flex: 1;
                display: flex;
            }
            .nav-right {
                justify-content: flex-end;
            }
            
            .dake-portfolio {
                padding: 0; /* Leaves no space around the section */
                height: calc(100vh - 95px);
                display: flex;
                align-items: stretch;
                background-color: var(--bg-primary);
                overflow: hidden; /* Prevents container from scrolling */
                position: relative; /* Anchors the absolutely positioned headline */
            }
            
            .dake-grid {
                display: grid;
                grid-template-columns: 1fr 1.5fr 1fr;
                gap: 0; /* Leaves no space between grid columns */
                width: 100%;
                height: 100%;
            }
            
            .dake-col {
                display: flex;
                flex-direction: column;
                gap: 0; /* Leaves no space between stacked images */
                height: 100%;
                min-height: 0; /* Ensures flex children can shrink to fit */
            }

            .center-col {
                /* No longer needs relative positioning here */
            }
            
            .dake-item {
                background-color: var(--accent);
                overflow: hidden;
                display: flex;
                min-height: 0; /* Enables strict scaling */
                position: relative; /* Anchors the headline to the specific image */
            }
            
            .dake-item img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.4s ease, filter 0.4s ease;
                filter: grayscale(10%) contrast(1.1);
            }
            
            .dake-item:hover img {
                transform: scale(1.05);
                filter: grayscale(0%) contrast(1.2);
            }
            
            .headline-box {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
                pointer-events: none; /* Allows you to still hover over images underneath */
                text-align: center;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            
            .headline-box h1 {
                font-family: var(--font-display);
                font-size: 5.5vw;
                line-height: 0.95;
                letter-spacing: 3px;
                margin: 0;
                color: var(--bg-primary);
                text-shadow: 3px 3px 0px var(--accent), -2px -2px 0px var(--accent), 2px -2px 0px var(--accent), -2px 2px 0px var(--accent), 2px 2px 0px var(--accent);
            }
            
            /* Dynamic flex ratios to fill exactly 100% of the container height */
            .tall { flex: 1.6; }
            .base { flex: 1; }
            .massive { flex: 2.5; }
            .strip { flex: 0.8; }
            .square { flex: 1.2; }
            .horizontal { flex: 1; }
            
            @media (max-width: 900px) {
                .dake-header {
                    flex-direction: column;
                    gap: 15px;
                    padding: 15px;
                }
                .nav-left, .nav-right {
                    justify-content: center;
                    width: 100%;
                }
                .dake-grid {
                    grid-template-columns: 1fr;
                    height: auto;
                }
                .dake-portfolio {
                    height: auto;
                    min-height: 100vh;
                }
                .dake-item { min-height: 250px; }
                .headline-box h1 { font-size: 7.5vw; text-shadow: 2px 2px 0px var(--accent), -1px -1px 0px var(--accent), 1px -1px 0px var(--accent), -1px 1px 0px var(--accent), 1px 1px 0px var(--accent); }
                .headline-box p { font-size: 2.5vw !important; font-weight: 400 !important; text-shadow: 1px 1px 0px var(--accent), -1px -1px 0px var(--accent), 1px -1px 0px var(--accent), -1px 1px 0px var(--accent); }
            }
        </style>
    </head>
    
    <body>
        <div class="main">
            <header class="dake-header">

                <nav class="nav-right">

            <section class="dake-portfolio">
                <div class="headline-box animate" data-animate-delay="0.2s">
                    <h1>CRAFTING DIGITAL FUTURES</h1>
                    <p style="font-size: 1.2vw; font-weight: 400; margin: 10px 0 0 0; letter-spacing: 4px; color: var(--bg-primary); text-shadow: 1px 1px 0px var(--accent), -1px -1px 0px var(--accent), 1px -1px 0px var(--accent), -1px 1px 0px var(--accent);">TRANSFORMING VISION INTO SEAMLESS REALITIES.</p>
                </div>
                <div class="dake-grid">
                    <!-- Left Column -->
                    <div class="dake-col">
                        <div class="dake-item tall animate" data-animate-delay="0.1s"><img src="images/PIC4.jpg" alt="Artwork 1"></div>
                        <div class="dake-item base animate" data-animate-delay="0.3s"><img src="images/PIC6.jpg" alt="Artwork 2"></div>
                    </div>

                    <!-- Center Column -->
                    <div class="dake-col center-col">
                        <div class="dake-item massive animate" data-animate-delay="0.4s">
                            <img src="images/PIC1.jpg" alt="Main Portrait">
                        </div>
                        <div class="dake-item strip animate" data-animate-delay="0.5s"><img src="images/PIC10.jpg" alt="Artwork Strip"></div>
                    </div>

                    <!-- Right Column -->
                    <div class="dake-col">
                        <div class="dake-item square animate" data-animate-delay="0.3s"><img src="images/PIC9.jpg" alt="Artwork 3"></div>
                        <div class="dake-item horizontal animate" data-animate-delay="0.5s"><img src="images/PIC7.jpg" alt="Artwork 4"></div>
                    </div>
                </div>
            </section>

                </ul>
