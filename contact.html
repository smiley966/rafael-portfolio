        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="images/logo.png" type="image/png" sizes="16x16"> 
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </head>
    <body>
        <div class="main">
            <header>
                <img src="images/logo.png" class="logo" alt="Logo">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="bx bx-menu" id="menu-icon"></label>
                <nav class="buttons">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="projects.html">Projects</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </header>

            <section id="contact" class="section-padding">
                <div class="contact-container animate" data-animate-delay="0.1s">
                    <div class="contact-left">
                        <h1 class="massive-text">PLUGGED INTO<br>THE FUTURE.</h1>
                        <p>Let's build something extraordinary together. Book a call or drop a message below.</p>
                    </div>
                    <div class="contact-right">
                        <form action="https://formsubmit.co/sanozarafael966@gmail.com" method="POST" class="sleek-form">
                            <div class="input-row">
                                <input type="text" name="name" placeholder="YOUR NAME" required>
                                <input type="email" name="email" placeholder="EMAIL ADDRESS" required>
                            </div>
                            <input type="text" name="subject" placeholder="SUBJECT">
                            <textarea name="message" placeholder="TELL ME ABOUT YOUR PROJECT" rows="4" required></textarea>
                            <input type="hidden" name="_captcha" value="false">
                            <button type="submit" class="btn primary">INITIATE CONTACT <i class='bx bx-right-arrow-alt'></i></button>
                        </form>
                    </div>
                </div>
            </section>

            <footer> 
                <div class="icons">
                    <a href="https://www.instagram.com/smiley_itoh/" target="_blank"><i class='bx bxl-instagram'></i></a>
                    <a href="https://www.facebook.com/10110010r" target="_blank"><i class='bx bxl-facebook'></i></a>
                    <a href="#" target="_blank"><i class='bx bxl-telegram'></i></a>
                    <a href="https://discord.gg/eb5TERyN" target="_blank"><i class='bx bxl-discord'></i></a>

        </div>
